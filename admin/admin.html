<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Privado - About Marketing</title>
    
    <link rel="stylesheet" href="../css/style_admin.css">
</head>
<body>
    <div class="admin-logo-header">
        <img src="../Imagenes/favi.png">
    </div>


    <div id="login-container" class="admin-container" style="max-width: 400px;">
        <h2 style="text-align: center;">Panel de Control</h2>
        <div class="admin-form">
            <input type="password" id="password-input" placeholder="Contraseña secreta...">
            <button id="login-btn" class="admin-btn">Entrar</button>
            <p id="error-msg" style="color: red; text-align: center; display: none; margin-top: 15px;">❌ Contraseña incorrecta.</p>
        </div>
    </div>

    <div id="panel-container" class="admin-container" style="display: none;">
        <h2 style="text-align: center;">Panel de Administración de Ponentes</h2>
        <div style="display: flex; gap: 40px; flex-wrap: wrap;">
            
            <div style="flex: 1; min-width: 300px;">
                <h3>➕ Añadir Nuevo</h3>
                <form id="add-speaker-form" class="admin-form">
                    <label>Nombre:</label>
                    <input type="text" id="nombre" required>
                    
                    <label>Rol:</label>
                    <input type="text" id="rol" required>
                    
                    <label>Imagen:</label>
                    <input type="text" id="imagenFondo" value="../Imagenes/IMAGEN DEFINITIVA.jpeg">
                    
                    <label>Vídeo:</label>
                    <input type="text" id="video" value="../Recursos/video.mp4">
                    
                    <label>Etiquetas:</label>
                    <input type="text" id="etiquetas" placeholder="SEO, IA...">
                
                    <label>LinkedIn (URL):</label>
                    <input type="text" id="linkedin" placeholder="https://linkedin.com/in/...">
                
                    <label>Instagram (URL):</label>
                    <input type="text" id="instagram" placeholder="https://instagram.com/...">
                    <label>Bio:</label>
                    <textarea id="bio" rows="3" required></textarea>
                    <button type="submit" class="admin-btn">Subir a GitHub</button>
                </form>
            </div>

            <div style="flex: 1; min-width: 300px;">
                <h3>🗑️ Gestionar Existentes</h3>
                <div id="speakers-list" style="max-height: 500px; overflow-y: auto;">
                    <p>Cargando ponentes...</p>
                </div>
            </div>

        </div>
    </div>
<div id="token-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; backdrop-filter: blur(5px);">
        <div style="background: rgba(15, 20, 30, 0.9); padding: 30px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center;">
            <h3 style="color: rgb(255, 212, 82); margin-top: 0;">🔐 Token de Acceso</h3>
            <p style="color: white; font-size: 14px; margin-bottom: 20px;">Pega tu GitHub Token. Se ocultará automáticamente.</p>

            <input type="password" id="token-input-field" placeholder="ghp_xxxxxxxxxxxx" 
                   style="width: 100%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 20px; box-sizing: border-box; font-size: 16px;">

            <button id="confirm-token-btn" class="admin-btn">Entrar al Panel</button>
        </div>
    </div>
    <script src="admin.js?v=redes"></script>
</body>
</html>
